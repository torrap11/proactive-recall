<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: file:" />
  <title>Jot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="search-body">
  <main class="search-shell">
    <div class="search-toolbar">
      <button id="import-db-btn" type="button">Import DB</button>
      <button id="export-db-btn" type="button">Export DB</button>
      <input id="query" type="search" placeholder="Search notes..." autofocus />
    </div>
    <div class="ai-key-access-row" aria-label="Anthropic API key">
      <span id="ai-key-access-status" class="ai-key-access-status">Checking API key…</span>
      <button id="ai-key-access-btn" type="button" title="Save or change your Anthropic API key">Set or update API key…</button>
    </div>
    <div class="prompt-toolbar">
      <input
        id="prompt-input"
        type="text"
        placeholder="Optional: describe how to reorder or slice the notes list (e.g. stopped talking about…)."
        aria-label="Open-ended note prompt"
      />
      <button id="prompt-confirm-btn" type="button">Confirm</button>
    </div>
    <section id="folder-diagram" class="folder-diagram" aria-label="Folder structure diagram"></section>
    <section id="organize-panel" class="organize-panel hidden" aria-label="AI folder organizer">
      <div class="organize-head">
        <span class="organize-title">Organize folders with AI</span>
        <div class="organize-head-actions">
          <span id="organize-api-status" class="organize-hint">API key not set</span>
          <button id="set-api-key-btn" type="button">Set API Key</button>
        </div>
      </div>
      <div id="organize-messages" class="organize-messages"></div>
    </section>
    <div id="bulk-actions" class="bulk-actions hidden">
      <span id="selected-count">0 selected</span>
      <button id="delete-selected-btn" type="button" class="btn-danger">Delete selected</button>
    </div>
    <div id="results"></div>
    <section id="editor" class="hidden">
      <div class="editor-meta">
        <span id="editor-date"></span>
        <div class="editor-actions">
          <button id="copy-note-btn" type="button">Copy</button>
          <button id="close-editor-btn" type="button" title="Close note panel" aria-label="Close note panel">×</button>
        </div>
      </div>
      <textarea id="editor-text"></textarea>
      <div class="image-row">
        <button id="attach-image-btn" type="button">Attach image</button>
      </div>
      <div class="file-row">
        <button id="attach-file-btn" type="button">Attach file</button>
      </div>
      <div id="note-images"></div>
      <div id="note-files"></div>
      <div class="folder-row">
        <label for="editor-folder-select">Folder</label>
        <select id="editor-folder-select" aria-label="Note folder"></select>
      </div>
      <div class="link-row">
        <input
          id="app-select"
          type="text"
          placeholder="Link to app..."
          aria-label="Link note to app"
        />
        <button id="link-btn" type="button">Link</button>
      </div>
      <div id="links"></div>
    </section>
  </main>
  <div id="image-lightbox" class="image-lightbox hidden" role="dialog" aria-modal="true" aria-label="Image preview">
    <button type="button" class="image-lightbox-close" aria-label="Close">×</button>
    <img id="image-lightbox-img" class="image-lightbox-img" alt="" />
  </div>
  <div id="api-key-modal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="api-key-modal-title">
    <div class="modal-dialog">
      <h2 id="api-key-modal-title" class="modal-title">Anthropic API key</h2>
      <p class="modal-hint">Paste your key (starts with <code>sk-ant-</code>). It is saved only on this Mac in the app data folder.</p>
      <p class="modal-link-row">
        <a id="anthropic-key-link" href="#" rel="noreferrer">Get API key from Anthropic dashboard</a>
      </p>
      <label class="modal-label" for="api-key-input">API key</label>
      <input
        id="api-key-input"
        type="password"
        class="modal-input"
        autocomplete="off"
        spellcheck="false"
        placeholder="sk-ant-..."
      />
      <p id="api-key-error" class="modal-error hidden" role="alert"></p>
      <div class="modal-actions">
        <button type="button" id="api-key-cancel" class="modal-btn secondary">Cancel</button>
        <button type="button" id="api-key-save" class="modal-btn primary">Save</button>
      </div>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
