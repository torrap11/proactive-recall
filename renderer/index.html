<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: jot-image:" />
  <title>Jot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="search-body">
  <main class="search-shell">
    <div class="search-toolbar jot-window-drag">
      <input id="query" type="search" placeholder="Search notes..." autofocus />
      <button type="button" id="cleanup-notes-btn" title="Deduplicate notes and optionally run AI merge (with API key)">
        Clean DB
      </button>
    </div>
    <p id="cleanup-status" class="cleanup-status cleanup-status--hidden" role="status" aria-live="polite"></p>
    <section id="folder-diagram" class="folder-diagram" aria-label="Folder structure diagram">
      <div class="folder-diagram-header">
        <span class="folder-diagram-title">Folder structure diagram</span>
        <button type="button" id="new-folder-btn">New folder</button>
      </div>
      <div id="folder-diagram-tree" class="folder-diagram-tree"></div>
    </section>
    <div id="bulk-actions" class="bulk-actions hidden">
      <span id="selected-count">0 selected</span>
      <button id="delete-selected-btn" type="button" class="btn-danger">Delete selected</button>
    </div>
    <div class="search-content">
      <div id="results"></div>
      <section id="editor" class="hidden">
        <div class="editor-meta">
          <span id="editor-date"></span>
          <div class="editor-actions">
            <button id="copy-note-btn" type="button">Copy</button>
            <button id="close-editor-btn" type="button" title="Close note panel" aria-label="Close note panel">×</button>
          </div>
        </div>
        <textarea id="editor-text"></textarea>
        <div class="image-row">
          <button id="attach-image-btn" type="button">Attach image</button>
        </div>
        <div class="file-row">
          <button id="attach-file-btn" type="button">Attach file</button>
        </div>
        <div id="note-images"></div>
        <div id="note-files"></div>
        <div class="folder-row">
          <label for="editor-folder-select">Folder</label>
          <select id="editor-folder-select" aria-label="Note folder"></select>
          <button type="button" id="editor-new-folder-btn" class="editor-new-folder-btn" title="Create new folder and move this note">+</button>
        </div>
        <div class="link-row">
          <input
            id="app-select"
            type="text"
            placeholder="Link to app..."
            aria-label="Link note to app"
          />
          <button id="link-btn" type="button">Link</button>
        </div>
        <div id="links"></div>
      </section>
    </div>
  </main>
  <div id="image-lightbox" class="image-lightbox hidden" role="dialog" aria-modal="true" aria-label="Image preview">
    <button type="button" class="image-lightbox-close" aria-label="Close">×</button>
    <img id="image-lightbox-img" class="image-lightbox-img" alt="" />
  </div>
  <div id="api-key-modal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="api-key-modal-title">
    <div class="modal-dialog">
      <h2 id="api-key-modal-title" class="modal-title">Anthropic API key</h2>
      <p class="modal-hint">Paste your key (starts with <code>sk-ant-</code>). It is saved only on this Mac in the app data folder.</p>
      <p class="modal-link-row">
        <a id="anthropic-key-link" href="#" rel="noreferrer">Get API key from Anthropic dashboard</a>
      </p>
      <label class="modal-label" for="api-key-input">API key</label>
      <input
        id="api-key-input"
        type="password"
        class="modal-input"
        autocomplete="off"
        spellcheck="false"
        placeholder="sk-ant-..."
      />
      <p id="api-key-error" class="modal-error hidden" role="alert"></p>
      <div class="modal-actions">
        <button type="button" id="api-key-cancel" class="modal-btn secondary">Cancel</button>
        <button type="button" id="api-key-save" class="modal-btn primary">Save</button>
      </div>
    </div>
  </div>
  <div id="new-folder-modal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="new-folder-modal-title">
    <div class="modal-dialog">
      <h2 id="new-folder-modal-title" class="modal-title">New folder</h2>
      <p id="new-folder-modal-hint" class="modal-hint">
        Choose a short name. You can move notes into this folder from the note editor.
      </p>
      <label class="modal-label" for="new-folder-name-input">Folder name</label>
      <input
        id="new-folder-name-input"
        type="text"
        class="modal-input new-folder-name-field"
        autocomplete="off"
        spellcheck="false"
        placeholder="e.g. Work"
      />
      <p id="new-folder-error" class="modal-error hidden" role="alert"></p>
      <div class="modal-actions">
        <button type="button" id="new-folder-cancel" class="modal-btn secondary">Cancel</button>
        <button type="button" id="new-folder-create" class="modal-btn primary">Create</button>
      </div>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
