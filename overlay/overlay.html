<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
  <title>Jot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      color-scheme: dark;
      --font-ui: -apple-system, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', sans-serif;
      --glass-bg: rgba(22, 22, 26, 0.88);
      --glass-border: rgba(255, 255, 255, 0.11);
      --card-bg: rgba(48, 48, 54, 0.72);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #f2f2f7;
      --dim: #8e8e93;
      --accent: #0a84ff;
      --accent-dim: rgba(10, 132, 255, 0.18);
      --danger: #ff453a;
      --success: #30d158;
      --radius: 16px;
      --card-radius: 10px;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.6),
        0 4px 16px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      animation: slideIn 0.3s cubic-bezier(0.34, 1.4, 0.64, 1) both;
    }

    @keyframes slideIn {
      from {
        transform: translateX(20px) scale(0.96);
        opacity: 0;
      }
      to {
        transform: translateX(0) scale(1);
        opacity: 1;
      }
    }

    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px 8px;
      border-bottom: 1px solid var(--glass-border);
    }

    #header-left {
      display: flex;
      align-items: baseline;
      gap: 5px;
      min-width: 0;
    }

    #header-app {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }

    #header-label {
      font-size: 11px;
      color: var(--dim);
      white-space: nowrap;
    }

    #header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .kbd-hint {
      font-size: 10px;
      color: var(--dim);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: var(--font-ui);
      letter-spacing: 0.02em;
    }

    #dismiss-all {
      background: none;
      border: none;
      color: var(--dim);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.15s, color 0.15s;
    }
    #dismiss-all:hover { background: rgba(255,255,255,0.08); color: var(--text); }

    #progress-track {
      height: 2px;
      background: rgba(255, 255, 255, 0.06);
      position: relative;
      overflow: hidden;
    }

    #progress-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, var(--accent), rgba(10, 132, 255, 0.4));
      transform-origin: left;
      animation: shrink linear forwards;
    }

    @keyframes shrink {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }

    #notes-container {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .note-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--card-radius);
      padding: 10px 12px;
      cursor: pointer;
      opacity: 0;
      animation: cardIn 0.25s ease-out forwards;
      transition: border-color 0.15s, background 0.15s;
    }

    .note-card:hover {
      border-color: rgba(255, 255, 255, 0.15);
      background: rgba(56, 56, 62, 0.8);
    }

    .note-card.focused {
      border-color: var(--accent);
      background: rgba(10, 132, 255, 0.06);
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .note-card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 3px;
      line-height: 1.3;
    }

    .note-card-snippet {
      font-size: 11.5px;
      color: var(--dim);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-height: 1.45;
      margin-bottom: 9px;
    }

    .note-card-badge {
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(10, 132, 255, 0.32);
      color: #8ec5ff;
      background: rgba(10, 132, 255, 0.12);
      border-radius: 999px;
      font-size: 10px;
      letter-spacing: 0.01em;
      padding: 2px 8px;
      margin-bottom: 6px;
    }

    .note-card-meta {
      font-size: 10.5px;
      color: #a5a5aa;
      margin-bottom: 9px;
      line-height: 1.4;
    }

    .note-card-actions {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 9px;
      border: 1px solid transparent;
      border-radius: 6px;
      font-size: 11.5px;
      font-family: var(--font-ui);
      cursor: pointer;
      transition: filter 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
      white-space: nowrap;
    }

    .action-btn kbd {
      font-size: 9px;
      opacity: 0.55;
      font-family: var(--font-ui);
      letter-spacing: 0.01em;
    }

    .action-btn.open {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
      flex: 1;
      justify-content: center;
    }
    .action-btn.open:hover { filter: brightness(1.15); }

    .action-btn.snooze {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.1);
      color: var(--dim);
    }
    .action-btn.snooze:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

    .action-btn.complete {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.1);
      color: var(--dim);
    }
    .action-btn.complete:hover { color: var(--success); border-color: var(--success); }
  </style>
</head>
<body>
  <div id="header">
    <div id="header-left">
      <span id="header-app">Jot</span>
      <span id="header-label">· relevant notes</span>
    </div>
    <div id="header-right">
      <span class="kbd-hint">K open · S snooze · D done · Esc close</span>
      <button id="dismiss-all" title="Dismiss all (Esc)">×</button>
    </div>
  </div>
  <div id="progress-track">
    <div id="progress-fill"></div>
  </div>
  <div id="notes-container"></div>
  <script src="overlay.js"></script>
</body>
</html>
